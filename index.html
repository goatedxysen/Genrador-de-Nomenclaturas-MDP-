<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomenclaturas MDP [2.0]</title>
    <style>
        :root {
            --primary: #fec82f; --primary-hover: #ffd65a; --bg: #1a1a19; 
            --card-bg: #242423; --text: #f1f5f9; --input-border: #3d3d3c; 
            --result-bg: #0f0f0f; --input-bg: #121211; --btn-clear-bg: #450a0a;
            --btn-clear-text: #fca5a5; --font-family: 'Aptos', 'Segoe UI', system-ui, sans-serif;
        }
        body { font-family: var(--font-family); background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 680px; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: var(--card-bg); color: var(--text); cursor: pointer; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; border: 1px solid var(--input-border); }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(254, 200, 47, 0.3); }
        .container { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); width: 100%; max-width: 680px; box-sizing: border-box; }
        .hidden { display: none !important; }
        h2 { color: var(--primary); margin: 0 0 20px 0; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; color: var(--primary); }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid var(--input-border); border-radius: 8px; background: var(--input-bg); color: var(--text); font-size: 1rem; box-sizing: border-box; }
        .dynamic-inputs { margin-top: 20px; padding: 20px; border-radius: 12px; background: rgba(254, 200, 47, 0.05); border: 1px solid var(--primary); }
        .result-area { margin-top: 25px; padding: 25px; background: var(--result-bg); border-radius: 12px; border: 2px solid var(--primary); text-align: center; }
        #finalText { font-weight: 700; font-size: 1.1rem; color: var(--primary); display: block; margin-bottom: 20px; min-height: 1.5em; word-break: break-all; }
        .btn-group { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .copy-btn { background: var(--primary); color: #000; }
        .clear-btn { background: var(--btn-clear-bg); color: var(--btn-clear-text); }
        .history-section { width: 100%; max-width: 680px; margin-top: 25px; }
        .history-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; opacity: 0.7; }
        .history-item { background: var(--card-bg); padding: 12px; border-radius: 10px; font-size: 0.85rem; border: 1px solid var(--input-border); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .response-card { background: var(--result-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .response-header { font-weight: 800; font-size: 0.8rem; color: var(--primary); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .response-body { font-size: 0.95rem; line-height: 1.5; white-space: pre-line; }
        .btn-copy-small { background: var(--primary); color: #000; border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-copy-small.success { background: #4ade80 !important; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" id="btn-nom" onclick="showTab('tab-nom')">Nomenclaturas</button>
    <button class="tab-btn" id="btn-resp" onclick="showTab('tab-resp')">Guía de Respuestas</button>
</div>

<div id="tab-nom" class="container">
    <h2>Nomenclaturas MDP</h2>
    <label>Método</label>
    <select id="metodo" onchange="actualizarProveedores()">
        <option value="">Seleccione...</option>
        <option value="deposito">📥 Depósito</option>
        <option value="retiro">📤 Retiro</option>
        <option value="debito">💳 Débito</option>
    </select>
    <label>Proveedor</label>
    <select id="proveedor" onchange="actualizarOpciones()" disabled><option value="">Elija método</option></select>
    <label>Variante</label>
    <select id="opcion" onchange="gestionarInputs()" disabled><option value="">Elija proveedor</option></select>

    <div id="dynamicContainer" class="dynamic-inputs" style="display:none">
        <div id="f-REF" style="display:none"><label>Referencia (REF)</label><input type="text" id="v-REF" oninput="generar()"></div>
        <div id="f-ID" style="display:none"><label>ID Operación</label><input type="text" id="v-ID" oninput="generar()"></div>
        <div id="f-IDP" style="display:none"><label>ID Proveedor (IDP)</label><input type="text" id="v-IDP" oninput="generar()"></div>
        <div id="f-CB" style="display:none"><label>Comprobante (CB)</label><input type="text" id="v-CB" oninput="generar()"></div>
        <div id="f-NT" style="display:none"><label>Número Ticket (NT)</label><input type="text" id="v-NT" oninput="generar()"></div>
        <div id="f-USER" style="display:none"><label>Username (Sin espacios)</label><input type="text" id="v-USER" oninput="validarUser(this); generar()"></div>
    </div>

    <div class="result-area">
        <span id="finalText">Esperando selección...</span>
        <div class="btn-group">
            <button class="action-btn copy-btn" onclick="copiarNom()">Copiar</button>
            <button class="action-btn clear-btn" onclick="resetear()">Limpiar</button>
        </div>
    </div>
</div>

<div id="tab-resp" class="container hidden">
    <h2>Guía de Respuestas</h2>
    <label>Filtrar Proveedor</label>
    <select id="filter-prov" onchange="renderRespuestas()">
        <option value="">Todos los casos</option>
        <option value="PAYPHONE">PAYPHONE</option>
        <option value="MONNET">MONNET</option>
        <option value="PagoFacil">PagoFacil</option>
        <option value="BDV-R4">BDV Y R4</option>
        <option value="GammaG">GammaG</option>
        <option value="TXT">TXT</option>
    </select>
    <div id="responses-list" style="margin-top: 20px;"></div>
</div>

<div class="history-section" id="hist-sec">
    <div class="history-title">🕒 Historial Reciente</div>
    <div id="historyList"></div>
</div>

<script>
const db = {
    deposito: {
        "TotalPago": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: TOTALPAGOS REF: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: TOTALPAGOS REF: XXX ID: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: BANESCO REF: XXX"],
        "PagoFacil": ["[179] ACREDITACION POR DEPOSITO NO PROCESADO IDP: XXX", "[179] ACREDITACION POR DEPOSITO NO PROCESADO CB: XXX", "[179] ACREDITACION POR DEPOSITO NO REGISTRADO NT: XXX", "[179] ACREDITACION POR DEPOSITO NO PROCESADO IDP: XXX ID: XXX"],
        "AstroPay": ["[169] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX", "[169] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "Rapyd": ["[178] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX", "[178] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "GammaG": ["[171] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX", "[171] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "Gigadat": ["[185] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "Directa24": ["[97] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "SafetyPay": ["[174] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "ALPS": ["[14] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Monnet": ["[64] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Payphone": ["[187] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Greenpay": ["[170] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Paycash": ["[190] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Nuvei": ["[173] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "R4": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: R4 REF: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: R4 REF: XXX ID: XXX"],
        "Banco de Venezuela": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: BDV REF: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: BDV REF: XXX ID: XXX"]
    },
    retiro: {
        "PagoFacil": ["[179] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX", "[179] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [02] ID: XXX"],
        "Astropay": ["[169] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX", "[169] NOT APPROVED WITHDRAWAL ACCREDITATION ID: XXX"],
        "Gigadat": ["[185] NOT APPROVED WITHDRAWAL ACCREDITATION ID: XXX"],
        "Rapyd": ["[178] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX"],
        "GammaG": ["[171] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX"],
        "Directa24": ["[97] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX"],
        "ALPS": ["[14] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX", "[14] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [02] ID: XXX" ],
        "Monnet": ["[64] ACREDITACION POR RETIRO NO ACREDITADO - ERROR BANCARIO [01] ID: XXX", "[64] ACREDITACION POR RETIRO NO ACREDITADO - ERROR EN DATOS BANCARIOS [02] ID: XXX"],
        "Nuvei": ["[173] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX"],
        "WireTransfer": ["[7] ACREDITACION POR RETIRO NO ACREDITADO - ERROR BANCARIO [01] ID: XXX", "[7] ACREDITACION POR RETIRO NO ACREDITADO - ERROR EN DATOS BANCARIOS [02] ID: XXX"]
    },
    debito: {
        "TotalPago": ["[59] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[59] DEBITO POR DEPÓSITO ID: XXX - (username)"],
        "ALPS": ["[14] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Astropay": ["[169] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Banco de Venezuela": ["[176] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[176] DEBITO POR DEPÓSITO ID: XXX - (username)"],
        "Directa24": ["[97] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "GammaG": ["[171] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Gigadat": ["[185] INCORRECT ACCREDITATION ADJUSTMENT ID: XXX"],
        "Greenpay": ["[170] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Monnet": ["[64] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Nuvei": ["[173] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "PagoFacil": ["[179] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Paycash": ["[190] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Payphone": ["[187] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "R4": ["[177] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[177] DEBITO POR DEPÓSITO ID: XXX - (username)"],
        "Rapyd": ["[178] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "SafetyPay": ["[174] AJUSTE POR ACREDITACION ERRADA ID: XXX"]
    }
};

const guia = [
    { prov: "TXT", titulo: "TRANSACCIÓN LIQUIDADA", texto: "El retiro fue procesado de manera exitosa el 16 abr 2026, 15:30:07\n\nEn caso de que el usuario insista con el reclamo, solicitarle el estado de cuenta en formato PDF." },
    { prov: "GammaG", titulo: "DEPÓSITO MENOR AL MÍNIMO", texto: "El usuario, al momento de realizar el depósito, envió un monto inferior a lo establecido; el monto mínimo es de 0.0001 BTC; sin embargo, envió 0.00001 BTC. Debido a ello, los fondos no llegaron a nuestro comercio. Cabe destacar que, durante el proceso de depósito, se muestra de manera explícita la siguiente advertencia:\n\n\"Tenga en cuenta el límite de depósito mínimo indicado, ya que no se pueden procesar depósitos por debajo de este límite\"." },
    { prov: "PAYPHONE", titulo: "TRANSACCIÓN CANCELADA", texto: "Luego de revisar el caso, confirmamos que la transacción figura como cancelada en nuestro sistema, por lo que no fue procesada ni liquidada al comercio.\n\nes posible que su entidad bancaria realizó una retención temporal o un débito provisional, aun cuando la transacción haya sido cancelada del lado del procesador. el mismo banco realiza la liberación o devolución del monto de manera automática, según sus tiempos internos.\n\nPor ello, recomendamos que el usuario se comunique directamente con su banco emisor para solicitar la revisión del movimiento." },
    { prov: "MONNET", titulo: "TRANSACCIÓN PROCESADA", texto: "El retiro se encuentra procesado de manera exitosa.\n\nEn caso de que el usuario insista con el reclamo, solicitarle los movimientos bancarios. Se anexa ejemplo." },
    { prov: "MONNET", titulo: "RETIRO A CUENTA DE TERCERO", texto: "El usuario poseía un retiro aprobado no acreditado que fue regularizado bajo el ID: [X]\n\nAl momento de comunicarse con el usuario, indicarle que solo puede solicitar retiros a cuentas en donde él sea el titular." },
    { prov: "PagoFacil", titulo: "RETIRO A OTRA CUENTA", texto: "Por favor, sondear con el usuario si posee alguna otra cuenta/billetera, como por ejemplo (BCP) y solicitarle el estado de cuenta de la misma." },
    { prov: "BDV-R4", titulo: "TRANSFERENCIAS INMEDIATAS", texto: "Indicarle al usuario que no realice transferencias a este método de depósito, en caso de que desee realizar su depósito mediante transferencia bancaria puede utilizar el método de 'TotalPago'" },
    { prov: "GammaG", titulo: "COMISIÓN CRIPTO", texto: "Luego de validar la transacción, se verificó que el monto acreditado es inferior debido al procesamiento de la criptomoneda. Durante la transacción, la red aplica comisiones y ajustes que pueden variar según las condiciones del momento." }
];

let historial = JSON.parse(localStorage.getItem('mdp_hist_final')) || [];

function showTab(id) {
    document.getElementById('tab-nom').classList.toggle('hidden', id !== 'tab-nom');
    document.getElementById('tab-resp').classList.toggle('hidden', id !== 'tab-resp');
    document.getElementById('hist-sec').classList.toggle('hidden', id !== 'tab-nom');
    document.getElementById('btn-nom').classList.toggle('active', id === 'tab-nom');
    document.getElementById('btn-resp').classList.toggle('active', id === 'tab-resp');
    if(id === 'tab-resp') renderRespuestas();
}

function validarUser(i) { i.value = i.value.replace(/\s/g, ''); }

function actualizarProveedores() {
    const m = document.getElementById('metodo').value, p = document.getElementById('proveedor');
    p.innerHTML = '<option value="">Seleccione Proveedor...</option>';
    if(m) { Object.keys(db[m]).sort().forEach(k => p.innerHTML += `<option value="${k}">${k}</option>`); p.disabled = false; }
    else p.disabled = true;
    actualizarOpciones();
}

function actualizarOpciones() {
    const m = document.getElementById('metodo').value, pr = document.getElementById('proveedor').value, o = document.getElementById('opcion');
    o.innerHTML = '<option value="">Seleccione Variante...</option>';
    if(m && pr) { db[m][pr].forEach(v => o.innerHTML += `<option value="${v}">${v}</option>`); o.disabled = false; }
    else o.disabled = true;
    gestionarInputs();
}

function gestionarInputs() {
    const v = document.getElementById('opcion').value;
    const f = { "REF: XXX": "f-REF", "ID: XXX": "f-ID", "IDP: XXX": "f-IDP", "CB: XXX": "f-CB", "NT: XXX": "f-NT", "(username)": "f-USER" };
    let any = false;
    for(let k in f) {
        const el = document.getElementById(f[k]);
        if(v.includes(k)) { el.style.display = "block"; any = true; }
        else { el.style.display = "none"; el.querySelector('input').value = ""; }
    }
    document.getElementById('dynamicContainer').style.display = any ? "block" : "none";
    generar();
}

function generar() {
    let res = document.getElementById('opcion').value;
    if(!res) { document.getElementById('finalText').innerText = "Esperando selección..."; return; }
    const maps = { "REF: XXX": "v-REF", "ID: XXX": "v-ID", "IDP: XXX": "v-IDP", "CB: XXX": "v-CB", "NT: XXX": "v-NT" };
    for(let k in maps) {
        const val = document.getElementById(maps[k]).value || "XXX";
        res = res.replace(k, k.replace("XXX", val));
    }
    res = res.replace("(username)", "(" + (document.getElementById('v-USER').value || "username") + ")");
    document.getElementById('finalText').innerText = res;
}

function copiarNom() {
    const t = document.getElementById('finalText').innerText;
    if(t.includes("Esperando")) return;
    navigator.clipboard.writeText(t);
    if(!historial.includes(t)) { 
        historial.unshift(t); 
        historial = historial.slice(0,5); 
        localStorage.setItem('mdp_hist_final', JSON.stringify(historial)); 
        updateHistUI(); 
    }
    const btn = document.querySelector('.copy-btn'); btn.innerText = "¡COPIADO!";
    setTimeout(() => btn.innerText = "Copiar", 1000);
}

function updateHistUI() {
    document.getElementById('historyList').innerHTML = historial.map(h => `
        <div class="history-item" onclick="copyFast('${h.replace(/'/g,"\\'")}')">
            <span>${h}</span>
            <small>📋</small>
        </div>`).join('');
}

function copyFast(t) { navigator.clipboard.writeText(t); }

function renderRespuestas() {
    const f = document.getElementById('filter-prov').value;
    document.getElementById('responses-list').innerHTML = guia.filter(r => !f || r.prov === f).map(r => `
        <div class="response-card">
            <div class="response-header"><span>${r.titulo} (${r.prov})</span><button class="btn-copy-small" onclick="copyAny('${r.texto.replace(/\n/g,'\\n').replace(/'/g,"\\'")}')">Copiar</button></div>
            <div class="response-body">${r.texto}</div>
        </div>`).join('');
}

function copyAny(t) {
    navigator.clipboard.writeText(t);
    const btn = event.target;
    if(btn.tagName === "BUTTON") { 
        btn.innerText = "¡OK!"; btn.classList.add('success'); 
        setTimeout(() => { btn.innerText = "Copiar"; btn.classList.remove('success'); }, 800); 
    }
}

function resetear() { location.reload(); }
updateHistUI();
</script>
</body>
</html>
