<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomenclaturas MDP [1.0]</title>
    <style>
        :root {
            --primary: #60a5fa; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f1f5f9; --input-border: #475569; --result-bg: #334155;
        }
        [data-theme="light"] {
            --primary: #1e40af; --bg: #cbd5e1; --card-bg: #ffffff;
            --text: #1e293b; --input-border: #94a3b8; --result-bg: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 650px; }
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--input-border); padding-bottom: 15px; }
        h2 { color: var(--primary); margin: 0; font-size: 1.3rem; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; color: var(--primary); }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--input-border); border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text); font-size: 1rem; }
        .dynamic-inputs { margin-top: 15px; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); display: none; }
        .result-area { margin-top: 25px; padding: 20px; background: var(--result-bg); border-radius: 10px; border: 2px solid var(--primary); }
        #finalText { font-family: 'Consolas', monospace; font-weight: bold; font-size: 1.05rem; word-break: break-all; min-height: 1.5em; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .copy-btn { background: var(--primary); color: #0f172a; }
        .clear-btn { background: #ef4444; color: white; }
        .theme-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); width: auto; flex: none; padding: 5px 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <h2>Generador de Nomenclaturas [MDP] </h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">Modo Claro ☀️</button>
    </div>

    <label>Método:</label>
    <select id="metodo" onchange="cargarProveedores()">
        <option value="">-- Seleccionar --</option>
        <option value="deposito">📥 Depósito</option>
        <option value="retiro">📤 Retiro</option>
        <option value="debito">💳 Débito</option>
    </select>

    <label>Proveedor:</label>
    <select id="proveedor" onchange="cargarOpciones()" disabled>
        <option value="">Primero elija método</option>
    </select>

    <label>Variante:</label>
    <select id="opcion" onchange="gestionarInputs()" disabled>
        <option value="">Primero elija proveedor</option>
    </select>

    <div id="dynamicContainer" class="dynamic-inputs">
        <div id="field-REF" style="display:none">
            <label>Completar REF:</label>
            <input type="text" id="val-REF" placeholder="Ingresa la Referencia aquí..." oninput="generar()">
        </div>
        <div id="field-ID" style="display:none">
            <label>Completar ID:</label>
            <input type="text" id="val-ID" placeholder="Ingresa el ID aquí..." oninput="generar()">
        </div>
        <div id="field-IDP" style="display:none">
            <label>Completar IDP:</label>
            <input type="text" id="val-IDP" placeholder="Ingresa el IDP aquí..." oninput="generar()">
        </div>
        <div id="field-CB" style="display:none">
            <label>Completar CB:</label>
            <input type="text" id="val-CB" placeholder="Ingresa el CB aquí..." oninput="generar()">
        </div>
        <div id="field-NT" style="display:none">
            <label>Completar NT:</label>
            <input type="text" id="val-NT" placeholder="Ingresa el NT aquí..." oninput="generar()">
        </div>
        <div id="field-USER" style="display:none">
            <label>Completar Username:</label>
            <input type="text" id="val-USER" placeholder="Ingresa el Usuario aquí..." oninput="generar()">
        </div>
    </div>

    <div class="result-area">
        <div id="finalText">Esperando selección...</div>
        <div class="btn-group">
            <button class="copy-btn" onclick="copiar()">Copiar</button>
            <button class="clear-btn" onclick="limpiarFormulario()">Limpiar</button>
        </div>
    </div>
</div>

<script>
const data = {
    deposito: {
        "PagoFacil": ["[179] ACREDITACION POR DEPOSITO NO PROCESADO IDP: XXX", "[179] ACREDITACION POR DEPOSITO NO PROCESADO CB: XXX", "[179] ACREDITACION POR DEPOSITO NO REGISTRADO NT: XXX", "[179] ACREDITACION POR DEPOSITO NO PROCESADO IDP: XXX ID: XXX"],
        "AstroPay": ["[169] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX", "[169] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "Rapyd": ["[178] UNPROCESSED DEPOSIT CREDIT ID: XXX", "[178] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "GammaG": ["[171] UNPROCESSED DEPOSIT CREDIT ID: XXX", "[171] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Gigadat": ["[185] UNPROCESSED DEPOSIT CREDIT ID: XXX"],
        "Directa24": ["[97] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "SafetyPay": ["[174] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "ALPS": ["[14] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Monnet": ["[64] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Payphone": ["[187] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Greenpay": ["[170] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Paycash": ["[190] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "Nuvei": ["[173] ACREDITACION POR DEPOSITO NO PROCESADO ID: XXX"],
        "R4": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: R4 REF: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: R4 REF: XXX ID: XXX"],
        "Banco de Venezuela": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: BDV REF: XXX", "ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: BDV REF: XXX ID: XXX"],
        "TotalPago": ["ACREDITACION POR PAGO NO PROCESADO PROVEEDOR: TOTALPAGOS REF: XXX"]
    },
    retiro: {
        "PagoFacil": ["[179] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01] ID: XXX", "[179] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [02] ID: XXX"],
        "Astropay": ["[169] NOT APPROVED WITHDRAWAL ACCREDITATION ID: XXX", "[169] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "Gigadat": ["[185] NOT APPROVED WITHDRAWAL ACCREDITATION ID: XXX"],
        "Rapyd": ["[178] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "GammaG": ["[171] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "Directa24": ["[97] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "ALPS": ["[14] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "Nuvei": ["[173] ACREDITACION POR RETIRO APROBADO NO ACREDITADO [01]"],
        "Monnet": ["[64] ACREDITACION POR RETIRO NO ACREDITADO - ERROR BANCARIO [01] ID: XXX", "[64] ACREDITACION POR RETIRO NO ACREDITADO - ERROR EN DATOS BANCARIOS [02] ID: XXX"],
        "WireTransfer": ["[7] ACREDITACION POR RETIRO NO ACREDITADO - ERROR BANCARIO [01] ID: XXX", "[7] ACREDITACION POR RETIRO NO ACREDITADO - ERROR EN DATOS BANCARIOS [02] ID: XXX"]
    },
    debito: {
        "ALPS": ["[14] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Astropay": ["[169] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Banco de Venezuela": ["[176] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[176] DEBITO POR DEPÓSITO ID: XXX", "[176] DEBITO POR DEPÓSITO ID: XXX - (username)"],
        "Directa24": ["[97] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "GammaG": ["[171] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Gigadat": ["[185] INCORRECT ACCREDITATION ADJUSTMENT ID: XXX"],
        "Greenpay": ["[170] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Monnet": ["[64] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Nuvei": ["[173] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "PagoFacil": ["[179] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[179] DEBITO POR DEPÓSITO ID: XXX"],
        "Paycash": ["[190] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "Payphone": ["[187] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "R4": ["[177] AJUSTE POR ACREDITACION ERRADA ID: XXX", "[177] DEBITO POR DEPÓSITO ID: XXX", "[177] DEBITO POR DEPÓSITO ID: XXX - (username)"],
        "Rapyd": ["[178] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "SafetyPay": ["[174] AJUSTE POR ACREDITACION ERRADA ID: XXX"],
        "TotalPago": ["[59] AJUSTE POR ACREDITACION ERRADA ID: XXX"]
    }
};

function cargarProveedores() {
    const met = document.getElementById('metodo').value;
    const pSel = document.getElementById('proveedor');
    pSel.innerHTML = '<option value="">Seleccione Proveedor...</option>';
    if (met) {
        Object.keys(data[met]).sort().forEach(p => {
            let o = document.createElement('option'); o.value = p; o.innerText = p; pSel.appendChild(o);
        });
        pSel.disabled = false;
    } else { pSel.disabled = true; }
    gestionarInputs();
}

function cargarOpciones() {
    const met = document.getElementById('metodo').value, prov = document.getElementById('proveedor').value;
    const oSel = document.getElementById('opcion');
    oSel.innerHTML = '<option value="">Seleccione Variante...</option>';
    if (met && prov) {
        data[met][prov].forEach(o => {
            let opt = document.createElement('option'); opt.value = o; opt.innerText = o; oSel.appendChild(opt);
        });
        oSel.disabled = false;
    } else { oSel.disabled = true; }
    gestionarInputs();
}

function gestionarInputs() {
    const base = document.getElementById('opcion').value;
    const container = document.getElementById('dynamicContainer');
    
    // Mapeo exacto para detectar qué campos mostrar
    const fields = { 
        "REF: XXX": "field-REF", "ID: XXX": "field-ID", "IDP: XXX": "field-IDP", 
        "CB: XXX": "field-CB", "NT: XXX": "field-NT", "(username)": "field-USER" 
    };
    
    let visible = false;
    for (let key in fields) {
        const div = document.getElementById(fields[key]);
        const input = div.querySelector('input');
        if (base && base.includes(key)) { 
            div.style.display = "block"; visible = true; 
        } else { 
            div.style.display = "none"; input.value = ""; 
        }
    }
    container.style.display = visible ? "block" : "none";
    generar();
}

function generar() {
    let res = document.getElementById('opcion').value;
    if (!res) { document.getElementById('finalText').innerText = "Esperando selección..."; return; }

    // Reemplazos de bloques fijos con XXX
    if (res.includes("REF: XXX")) res = res.replace("REF: XXX", "REF: " + (document.getElementById('val-REF').value || "XXX"));
    if (res.includes("ID: XXX")) res = res.replace("ID: XXX", "ID: " + (document.getElementById('val-ID').value || "XXX"));
    if (res.includes("IDP: XXX")) res = res.replace("IDP: XXX", "IDP: " + (document.getElementById('val-IDP').value || "XXX"));
    if (res.includes("CB: XXX")) res = res.replace("CB: XXX", "CB: " + (document.getElementById('val-CB').value || "XXX"));
    if (res.includes("NT: XXX")) res = res.replace("NT: XXX", "NT: " + (document.getElementById('val-NT').value || "XXX"));
    
    // Username con mantenimiento de paréntesis estrictos
    if (res.includes("(username)")) {
        let userVal = document.getElementById('val-USER').value;
        res = res.replace("(username)", userVal ? "(" + userVal + ")" : "(username)");
    }
    document.getElementById('finalText').innerText = res;
}

function copiar() {
    const txt = document.getElementById('finalText').innerText;
    if (txt.includes("Esperando")) return;
    navigator.clipboard.writeText(txt);
    const btn = document.querySelector('.copy-btn'); btn.innerText = "¡COPIADO!";
    setTimeout(() => btn.innerText = "Copiar", 1000);
}

function limpiarFormulario() {
    // 1. Resetear el primer selector
    document.getElementById('metodo').value = "";
    
    // 2. Forzar limpieza y bloqueo de los selectores secundarios
    const pSel = document.getElementById('proveedor');
    pSel.innerHTML = '<option value="">Primero elija método</option>';
    pSel.disabled = true;

    const oSel = document.getElementById('opcion');
    oSel.innerHTML = '<option value="">Primero elija proveedor</option>';
    oSel.disabled = true;

    // 3. Limpiar absolutamente todos los inputs del contenedor dinámico
    const todosLosInputs = document.querySelectorAll('#dynamicContainer input');
    todosLosInputs.forEach(inp => inp.value = "");

    // 4. Esconder el contenedor y resetear el texto final
    document.getElementById('dynamicContainer').style.display = "none";
    document.getElementById('finalText').innerText = "Esperando selección...";
}

function toggleTheme() {
    const b = document.body; const btn = document.getElementById('themeToggle');
    if (b.getAttribute('data-theme') === 'light') { b.removeAttribute('data-theme'); btn.innerText = "Modo Claro ☀️"; }
    else { b.setAttribute('data-theme', 'light'); btn.innerText = "Modo Oscuro 🌙"; }
}
</script>
</body>
</html>
